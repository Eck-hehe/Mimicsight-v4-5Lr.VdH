<!DOCTYPE html>
<html>
<head>
  <title>ARG Terminal</title>
  <style>
    body {
      background: black;
      color: lime;
      font-family: monospace;
      padding: 20px;
    }

    #output {
      white-space: pre-wrap;
      margin-bottom: 10px;
    }

    input {
      background: black;
      color: lime;
      border: none;
      outline: none;
      font-family: monospace;
      width: 90%;
    }
  </style>
</head>
<body>
  <div id="output">
ARG TERMINAL v1.0
Type "help" for commands.

  </div>

  > <input id="cmd" autofocus>

  <script>
    const output = document.getElementById("output");
    const cmd = document.getElementById("cmd");

    const commands = {
      help: "Commands:\nhelp\nls\ncat secret.txt",
      ls: "secret.txt",
      "cat secret.txt": "FLAG{you_found_the_file}"
    };

    cmd.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const value = cmd.value.trim();

        output.textContent += "\n> " + value + "\n";

        if (commands[value]) {
          output.textContent += commands[value] + "\n";
        } else {
          output.textContent += "Command not found.\n";
        }

        cmd.value = "";
        window.scrollTo(0, document.body.scrollHeight);
      }
    });
  </script>
</body>
</html>
